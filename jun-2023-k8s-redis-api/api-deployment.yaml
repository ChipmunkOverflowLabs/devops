apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
    spec:
      containers:
      - name: api-server
        image: node:18-alpine
        env:
        - name: redisHost
          value: "redis-cache-service"
        - name: redisPort
          value: "6379"
        ports:
        - containerPort: 3000
          name: containerPortName
