- name: Install and configure Nginx with Upstream Keepalive
  hosts: proxyHosts
  become: true
  vars_files:
    - vars/proxyVars.yml
  tasks:
    - name: Install nginx server package
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Write reverse proxy configuration with keepalive
      copy:
        content: |
          upstream backend {
              server {{ targetUpstreamAddress }};
              keepalive {{ keepaliveConnectionsLimit }};
          }
          server {
              listen 80;
              location / {
                  proxy_pass http://backend;
                  proxy_http_version 1.1;
                  proxy_set_header Connection "";
              }
          }
        dest: /etc/nginx/sites-available/default
