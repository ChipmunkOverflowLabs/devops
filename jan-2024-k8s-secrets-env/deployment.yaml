apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: internal-api
  template:
    metadata:
      labels:
        app: internal-api
    spec:
      nodeSelector:
        workloadType: "computeOptimized"
      containers:
      - name: api-container
        image: nginx:1.25.3
        env:
        - name: authKey
          valueFrom:
            secretKeyRef:
              name: internal-api-credentials
              key: secretKeyVal
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
