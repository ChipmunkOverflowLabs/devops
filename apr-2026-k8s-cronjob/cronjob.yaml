apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-cleanup-job
  namespace: default
  labels:
    jobScope: "nightlyMaintenance"
spec:
  schedule: "0 1 * * *"
  timeZone: "America/New_York"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: worker
            image: busybox:1.36.1
            command: ["echo", "Starting cleanup tasks"]
            resources:
              requests:
                cpu: "50m"
                memory: "32Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"
          restartPolicy: OnFailure
