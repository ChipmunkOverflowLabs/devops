- name: Install and configure Nginx Reverse Proxy
  hosts: proxies
  become: true
  vars_files:
    - vars/proxyVars.yml
  tasks:
    - name: Install nginx package
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Write reverse proxy server block config
      copy:
        content: |
          server {
              listen 80;
              location / {
                  proxy_pass http://{{ upstreamHostAddress }}:{{ backendPort }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
        dest: /etc/nginx/sites-available/default
      notify: restartNginxService

    - name: Ensure nginx is active
      service:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: restartNginxService
      service:
        name: nginx
        state: restarted
