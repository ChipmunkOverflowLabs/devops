apiVersion: apps/v1
kind: Deployment
metadata:
  name: graceful-shutdown-app
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: graceful-app
  template:
    metadata:
      labels:
        app: graceful-app
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: app-server
        image: nginx:1.27.1
        lifecycle:
          preStop:
            exec:
              command: [ "/bin/sh", "-c", "sleep 15" ]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
