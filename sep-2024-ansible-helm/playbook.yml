- name: Install Helm CLI Tool on Control Node
  hosts: controlNodes
  become: true
  vars_files:
    - vars/helmVars.yml
  tasks:
    - name: Download Helm installer script
      get_url:
        url: "https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3"
        dest: "/tmp/get_helm.sh"
        mode: '0755'

    - name: Run script to install Helm
      shell: "/tmp/get_helm.sh --version {{ helmVersionString }}"
      environment:
        HELM_INSTALL_DIR: "{{ installDestinationPath }}"
