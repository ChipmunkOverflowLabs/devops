apiVersion: v1
kind: Service
metadata:
  name: app-sticky-service
  namespace: default
  labels:
    sessionScope: "stickyClient"
spec:
  selector:
    app: sticky-app
  ports:
  - port: 80
    targetPort: 8080
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
