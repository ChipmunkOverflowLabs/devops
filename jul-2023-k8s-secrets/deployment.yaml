apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
      - name: service-container
        image: nginx:1.25.1
        env:
        - name: dbHost
          valueFrom:
            configMapKeyRef:
              name: app-config-properties
              key: databaseHostName
        - name: dbPassword
          valueFrom:
            secretKeyRef:
              name: app-secure-secrets
              key: databasePasswordVal
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
