apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup-cronjob
spec:
  schedule: "0 1 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup-worker
            image: postgres:15.3-alpine
            command:
            - /bin/sh
            - -c
            - "echo Starting backup job for sync target: $DBSYNC; pg_isready"
            env:
            - name: DBSYNC
              valueFrom:
                configMapKeyRef:
                  name: db-sync-config
                  key: dbSyncTargetName
            resources:
              requests:
                cpu: "100m"
                memory: "64Mi"
              limits:
                cpu: "250m"
                memory: "128Mi"
          restartPolicy: OnFailure
