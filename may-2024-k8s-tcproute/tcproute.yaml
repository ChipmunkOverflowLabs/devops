apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: database-tcp-route
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: database-gateway
    sectionName: tcpPort
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: postgres-db-service
      port: 5432
