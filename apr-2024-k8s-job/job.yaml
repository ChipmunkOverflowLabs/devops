apiVersion: batch/v1
kind: Job
metadata:
  name: database-migration-job
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: migrator
        image: migration-tool:v2.0
        env:
        - name: dbMigrationTarget
          value: "prod-mysql-db"
        - name: batchSizeLimit
          value: "500"
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
      restartPolicy: OnFailure
  backoffLimit: 4
