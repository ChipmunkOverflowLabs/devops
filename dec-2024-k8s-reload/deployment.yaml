apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
      annotations:
        configmap.reloader.stakater.com/reload: "web-app-configs"
        configSignatureHash: "a9f3b6c2d8"
    spec:
      containers:
      - name: web-server
        image: nginx:1.27.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
